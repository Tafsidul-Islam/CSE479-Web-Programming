<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Number Game</title>
</head>
<body>
    <h1>Guess the Number Game</h1>
    <p>I'm thinking of a number between 1 and 100. Can you guess it?</p>
    <input type="number" id="guessInput" placeholder="Enter your guess">
    <button onclick="checkGuess()">Submit Guess</button>
    <p id="feedback"></p>
    <p id="attempts"></p>

    <script>
        let randomNumber = Math.floor(Math.random() * 100) + 1;
        let guessCount = 0;

        function checkGuess() {
            let userGuess = parseInt(document.getElementById("guessInput").value);
            guessCount++;

            let feedback = document.getElementById("feedback");
            let attempts = document.getElementById("attempts");

            if (userGuess === randomNumber) {
                feedback.textContent = `Congratulations! You guessed the number ${randomNumber} correctly!`;
                attempts.textContent = `It took you ${guessCount} attempts.`;
            } else if (userGuess > randomNumber) {
                feedback.textContent = "Too high! Try again.";
            } else if (userGuess < randomNumber) {
                feedback.textContent = "Too low! Try again.";
            } else {
                feedback.textContent = "Invalid input. Please enter a number between 1 and 100.";
            }
        }
    </script>
</body>
</html>
